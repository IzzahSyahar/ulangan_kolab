<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Cubicubi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bgMove 10s ease infinite;
        }

        @keyframes bgMove {
            0% {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            50% {
                background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            }
            100% {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
        }

        .container {
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            font-size: 4em;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        p {
            font-size: 1.2em;
            color: white;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn-nilai {
            background: white;
            color: #764ba2;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse 2s infinite;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-nilai:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: #764ba2;
            color: white;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        .btn-nilai a {
            text-decoration: none;
            color: inherit;
        }

        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0.7;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 CUBICUBI</h1>
        <p>Sistem Informasi Nilai Mahasiswa</p>
        <button class="btn-nilai">
            <a href="nilai.html">📋 Lihat Daftar Nilai</a>
        </button>
        <footer>
            <p>© 2024 - Tim Cubicubi</p>
        </footer>
    </div>
</body>
</html>
